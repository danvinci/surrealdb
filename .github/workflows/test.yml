name: Test
on: [push, pull_request]

jobs:
  # Unit-only run: server-dependent and embedded testsets self-skip when
  # their prerequisites aren't available. Matrix across the compat range
  # (1.9 LTS) and current stable to catch version-skew regressions.
  test-unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.9', '1']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - run: julia --project=. test/runtests.jl

  test-remote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Start SurrealDB
        run: |
          docker run -d -p 8000:8000 \
            --name surrealdb \
            surrealdb/surrealdb:latest \
            start --user root --pass root memory
      - name: Wait for SurrealDB
        run: |
          for i in $(seq 1 30); do
            curl -s -X POST http://localhost:8000/rpc \
              -H "Content-Type: application/json" \
              -d '{"id":1,"method":"version","params":[]}' && break
            sleep 1
          done
      - name: Run remote tests
        run: julia --project=. test/runtests.jl
        env:
          SURREALDB_URL: ws://localhost:8000
      - name: Docker logs (on failure)
        if: failure()
        run: docker logs surrealdb

  test-embedded:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            /tmp/surrealdb.c/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-libsurreal-${{ runner.os }}
      - name: Build libsurreal
        run: |
          if [ ! -d /tmp/surrealdb.c ]; then
            git clone https://github.com/surrealdb/surrealdb.c.git --depth 1 /tmp/surrealdb.c
          fi
          cd /tmp/surrealdb.c
          cargo build --release
          cp target/release/libsurrealdb_c.so ${RUNNER_TEMP}/libsurreal.so || \
            cp target/release/libsurrealdb_c.dylib ${RUNNER_TEMP}/libsurreal.so || \
            cp target/release/surrealdb_c.dll ${RUNNER_TEMP}/libsurreal.so
        env:
          CARGO_PROFILE_RELEASE_DEBUG: 0
      - name: Run full suite (embedded loaded via SURREALDB_LIB)
        run: julia --project=. test/runtests.jl
        env:
          SURREALDB_LIB: ${{ runner.temp }}/libsurreal.so
